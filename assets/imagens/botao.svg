<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <!-- Fundo -->
  <rect width="200" height="200" fill="#fce7f3"/>
  
  <!-- Tecido de fundo -->
  <rect x="25" y="25" width="150" height="150" fill="#fbcfe8" stroke="#333" stroke-width="2" rx="5"/>
  
  <!-- Linhas horizontais do tecido -->
  <line x1="25" y1="55" x2="175" y2="55" stroke="#ec4899" stroke-width="1.5" stroke-dasharray="4 4"/>
  <line x1="25" y1="85" x2="175" y2="85" stroke="#ec4899" stroke-width="1.5" stroke-dasharray="4 4"/>
  <line x1="25" y1="115" x2="175" y2="115" stroke="#ec4899" stroke-width="1.5" stroke-dasharray="4 4"/>
  <line x1="25" y1="145" x2="175" y2="145" stroke="#ec4899" stroke-width="1.5" stroke-dasharray="4 4"/>
  
  <!-- Linhas verticais do tecido -->
  <line x1="55" y1="25" x2="55" y2="175" stroke="#ec4899" stroke-width="1.5" stroke-dasharray="4 4"/>
  <line x1="100" y1="25" x2="100" y2="175" stroke="#ec4899" stroke-width="1.5" stroke-dasharray="4 4"/>
  <line x1="145" y1="25" x2="145" y2="175" stroke="#ec4899" stroke-width="1.5" stroke-dasharray="4 4"/>
  
  <!-- Botão principal (círculo roxo) -->
  <circle cx="100" cy="100" r="40" fill="#a78bfa" stroke="#333" stroke-width="3"/>
  
  <!-- Anel decorativo interno -->
  <circle cx="100" cy="100" r="30" fill="none" stroke="#333" stroke-width="2" stroke-dasharray="3 3"/>
  
  <!-- 4 furos do botão -->
  <circle cx="100" cy="85" r="4" fill="#1f2937"/>
  <circle cx="100" cy="115" r="4" fill="#1f2937"/>
  <circle cx="85" cy="100" r="4" fill="#1f2937"/>
  <circle cx="115" cy="100" r="4" fill="#1f2937"/>
  
  <!-- Brilho no botão -->
  <ellipse cx="85" cy="85" rx="10" ry="5" fill="white" opacity="0.6"/>
  <ellipse cx="85" cy="85" rx="5" ry="3" fill="white"/>
</svg>
