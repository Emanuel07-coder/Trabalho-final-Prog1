<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" aria-label="Sino">
  <rect width="200" height="200" fill="#dbeafe"/>
  <!-- Linhas de som (esquerda) -->
  <path d="M40 80 Q25 90 30 105" fill="none" stroke="#3b82f6" stroke-width="4" stroke-linecap="round"/>
  <path d="M30 110 Q15 120 20 135" fill="none" stroke="#3b82f6" stroke-width="4" stroke-linecap="round"/>
  <!-- Linhas de som (direita) -->
  <path d="M160 80 Q175 90 170 105" fill="none" stroke="#3b82f6" stroke-width="4" stroke-linecap="round"/>
  <path d="M170 110 Q185 120 180 135" fill="none" stroke="#3b82f6" stroke-width="4" stroke-linecap="round"/>
  <!-- Haste superior (onde o sino é pendurado) -->
  <rect x="95" y="20" width="10" height="15" fill="#92400e" stroke="#333" stroke-width="2"/>
  <!-- Argola -->
  <circle cx="100" cy="18" r="5" fill="none" stroke="#92400e" stroke-width="3"/>
  <!-- Topo do sino (cupula) -->
  <circle cx="100" cy="38" r="8" fill="#f59e0b" stroke="#333" stroke-width="2"/>
  <!-- Corpo do sino -->
  <path d="M70 45 L100 35 L130 45 L138 130 L62 130 Z" fill="#fbbf24" stroke="#333" stroke-width="3"/>
  <!-- Detalhe decorativo -->
  <line x1="75" y1="55" x2="125" y2="55" stroke="#92400e" stroke-width="2" opacity="0.5"/>
  <!-- Brilho lateral -->
  <path d="M75 50 L78 120" fill="none" stroke="white" stroke-width="3" opacity="0.6"/>
  <!-- Base do sino (boca) -->
  <ellipse cx="100" cy="130" rx="38" ry="6" fill="#f59e0b" stroke="#333" stroke-width="3"/>
  <!-- Badalo (bola interna) -->
  <line x1="100" y1="65" x2="100" y2="120" stroke="#92400e" stroke-width="2"/>
  <circle cx="100" cy="125" r="7" fill="#92400e" stroke="#333" stroke-width="2"/>
  <!-- Brilho no badalo -->
  <circle cx="98" cy="123" r="2" fill="white" opacity="0.5"/>
</svg>
