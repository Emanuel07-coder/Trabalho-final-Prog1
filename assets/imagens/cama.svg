<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" aria-label="Cama">
  <rect width="200" height="200" fill="#ddd6fe"/>
  <!-- Chão -->
  <line x1="15" y1="175" x2="185" y2="175" stroke="#333" stroke-width="2"/>
  <!-- Cabeceira -->
  <rect x="25" y="45" width="18" height="130" rx="3" fill="#92400e" stroke="#333" stroke-width="3"/>
  <!-- Detalhes da cabeceira -->
  <rect x="29" y="50" width="10" height="6" fill="#78350f"/>
  <rect x="29" y="165" width="10" height="6" fill="#78350f"/>
  <!-- Colchão -->
  <rect x="43" y="125" width="130" height="45" rx="5" fill="white" stroke="#333" stroke-width="3"/>
  <!-- Lençol cobrindo -->
  <path d="M43 125 L173 125 L173 140 L43 140 Z" fill="#a78bfa" stroke="#333" stroke-width="2"/>
  <!-- Travesseiro -->
  <ellipse cx="65" cy="108" rx="22" ry="10" fill="white" stroke="#333" stroke-width="2.5"/>
  <!-- Cobertor dobrado -->
  <path d="M115 115 Q140 110 165 115 L165 130 L115 130 Z" fill="#ec4899" stroke="#333" stroke-width="2"/>
  <!-- Pés da cama -->
  <rect x="38" y="170" width="10" height="12" fill="#92400e" stroke="#333" stroke-width="2"/>
  <rect x="168" y="170" width="10" height="12" fill="#92400e" stroke="#333" stroke-width="2"/>
  <!-- Detalhes do lençol (listras) -->
  <line x1="55" y1="155" x2="55" y2="165" stroke="#a78bfa" stroke-width="1.5"/>
  <line x1="75" y1="150" x2="75" y2="165" stroke="#a78bfa" stroke-width="1.5"/>
  <line x1="95" y1="155" x2="95" y2="165" stroke="#a78bfa" stroke-width="1.5"/>
  <line x1="115" y1="150" x2="115" y2="165" stroke="#a78bfa" stroke-width="1.5"/>
  <line x1="135" y1="155" x2="135" y2="165" stroke="#a78bfa" stroke-width="1.5"/>
  <line x1="155" y1="150" x2="155" y2="165" stroke="#a78bfa" stroke-width="1.5"/>
  <!-- Brilho no travesseiro -->
  <ellipse cx="60" cy="105" rx="6" ry="2" fill="white" opacity="0.6"/>
</svg>
