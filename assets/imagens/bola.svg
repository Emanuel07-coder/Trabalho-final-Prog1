<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" aria-label="Bola de futebol">
  <rect width="200" height="200" fill="#dcfce7"/>
  <!-- Bola principal -->
  <circle cx="100" cy="100" r="65" fill="white" stroke="#333" stroke-width="3"/>
  <!-- Pentágono central (preto) -->
  <polygon points="100,75 122,90 113,118 87,118 78,90" fill="#1f2937" stroke="#333" stroke-width="2"/>
  <!-- Linhas de conexão -->
  <line x1="100" y1="35" x2="100" y2="75" stroke="#333" stroke-width="2.5"/>
  <line x1="100" y1="118" x2="100" y2="165" stroke="#333" stroke-width="2.5"/>
  <line x1="35" y1="100" x2="78" y2="100" stroke="#333" stroke-width="2.5"/>
  <line x1="122" y1="100" x2="165" y2="100" stroke="#333" stroke-width="2.5"/>
  <line x1="55" y1="55" x2="82" y2="82" stroke="#333" stroke-width="2.5"/>
  <line x1="118" y1="82" x2="145" y2="55" stroke="#333" stroke-width="2.5"/>
  <line x1="55" y1="145" x2="82" y2="118" stroke="#333" stroke-width="2.5"/>
  <line x1="118" y1="118" x2="145" y2="145" stroke="#333" stroke-width="2.5"/>
  <!-- Brilho -->
  <ellipse cx="80" cy="70" rx="8" ry="5" fill="white" opacity="0.7"/>
</svg>
